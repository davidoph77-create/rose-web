<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose IA</title>
  <meta name="theme-color" content="#6d28d9" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(236,72,153,0.18), transparent 30%),
        linear-gradient(135deg, #160f3a 0%, #24145c 45%, #4c1d95 100%);
      color: white;
      min-height: 100vh;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      box-shadow: 0 10px 24px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.82;
      margin-top: 4px;
    }

    .status {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(34,197,94,0.18);
      border: 1px solid rgba(34,197,94,0.32);
      white-space: nowrap;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 20px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 8px 22px rgba(0,0,0,0.14);
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
    }

    .rose {
      align-self: flex-start;
      background: rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .meta {
      font-size: 12px;
      opacity: 0.78;
      margin-top: 8px;
    }

    .composer {
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: stretch;
      background: rgba(0,0,0,0.10);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 58px;
      max-height: 150px;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      background: rgba(255,255,255,0.96);
      color: #111827;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      color: white;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      min-width: 112px;
      padding: 0 18px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
    }

    button.secondary {
      min-width: 62px;
      font-size: 22px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.12);
    }

    button.soft {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.12);
      min-width: auto;
      padding: 0 14px;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .settings {
      padding: 12px 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255,255,255,0.04);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .row label {
      font-size: 13px;
      opacity: 0.92;
      min-width: 118px;
    }

    .row input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      opacity: 0.95;
    }

    .hint {
      font-size: 12px;
      opacity: 0.72;
    }

    @media (max-width: 700px) {
      .app {
        padding: 0;
      }

      .topbar, .panel {
        border-radius: 0;
      }

      .topbar {
        padding: 14px;
      }

      .title {
        font-size: 21px;
      }

      .bubble {
        max-width: 92%;
      }

      .composer {
        flex-direction: column;
      }

      .controls {
        width: 100%;
      }

      button {
        flex: 1;
        min-height: 52px;
      }

      button.secondary {
        flex: 0 0 72px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="avatar" id="avatarMood">🌹</div>
        <div>
          <div class="title">Rose IA</div>
          <div class="subtitle">Stylée, vocale, connectée à ton backend Supabase</div>
        </div>
      </div>
      <div class="status" id="statusText">Prête</div>
    </div>

    <div class="panel">
      <div class="chat" id="chat"></div>

      <div class="composer">
        <textarea id="messageInput" placeholder="Écris ou dicte un message à Rose..."></textarea>
        <div class="controls">
          <button class="secondary" id="micBtn" title="Micro">🎤</button>
          <button class="soft" id="speakBtn" title="Arrêter la voix">🔊</button>
          <button id="sendBtn">Envoyer</button>
        </div>
      </div>

      <div class="settings">
        <div class="row">
          <label for="apiUrl">URL API Rose</label>
          <input
            id="apiUrl"
            type="text"
            value="https://intmggzouwcaidotikbt.supabase.co/functions/v1/rose-agent-system"
          />
        </div>

        <div class="row">
          <label class="toggle">
            <input type="checkbox" id="voiceToggle" checked />
            Lire la réponse à voix haute
          </label>

          <label class="toggle">
            <input type="checkbox" id="historyToggle" checked />
            Envoyer l'historique
          </label>
        </div>

        <div class="hint">
          Le micro marche surtout sur Chrome / Edge. Sur téléphone, autorise le micro dans le navigateur.
        </div>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const speakBtn = document.getElementById("speakBtn");
    const apiUrlInput = document.getElementById("apiUrl");
    const voiceToggle = document.getElementById("voiceToggle");
    const historyToggle = document.getElementById("historyToggle");
    const statusText = document.getElementById("statusText");
    const avatarMood = document.getElementById("avatarMood");

    const userId = "david";
    let history = [];
    let recognition = null;
    let isRecording = false;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function setAvatarByMood(mood) {
      const map = {
        joy: "😊",
        sadness: "🥺",
        anger: "😠",
        fear: "😟",
        stress: "😵",
        love: "💖",
        neutral: "🌹"
      };
      avatarMood.textContent = map[mood] || "🌹";
    }

    function addMessage(role, text, meta = "") {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;

      const content = document.createElement("div");
      content.textContent = text;
      div.appendChild(content);

      if (meta) {
        const metaDiv = document.createElement("div");
        metaDiv.className = "meta";
        metaDiv.textContent = meta;
        div.appendChild(metaDiv);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function stopSpeaking() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      setStatus("Prête");
    }

    function speak(text) {
      if (!voiceToggle.checked) return;
      if (!("speechSynthesis" in window)) return;

      stopSpeaking();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "fr-FR";
      utterance.rate = 1;
      utterance.pitch = 1.04;

      utterance.onstart = () => setStatus("Rose parle...");
      utterance.onend = () => setStatus("Prête");
      utterance.onerror = () => setStatus("Prête");

      window.speechSynthesis.speak(utterance);
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      const apiUrl = apiUrlInput.value.trim();

      if (!message) return;
      if (!apiUrl) {
        alert("Ajoute l'URL API de Rose.");
        return;
      }

      stopSpeaking();

      addMessage("user", message);
      const outboundHistory = historyToggle.checked
        ? [...history, { role: "user", content: message }]
        : [];

      history.push({ role: "user", content: message });
      messageInput.value = "";

      sendBtn.disabled = true;
      micBtn.disabled = true;
      setStatus("Rose réfléchit...");

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: userId,
            message,
            history: outboundHistory
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          addMessage("rose", `Erreur : ${data?.error || "Erreur inconnue"}`);
          setStatus("Erreur");
          return;
        }

        const meta = `intent: ${data.intent} | mood: ${data.mood} | source: ${data.source}`;
        addMessage("rose", data.reply, meta);
        setAvatarByMood(data.mood || "neutral");

        history.push({ role: "assistant", content: data.reply });
        setStatus("Prête");
        speak(data.reply);
      } catch (error) {
        addMessage("rose", `Erreur réseau : ${error.message}`);
        setStatus("Hors ligne");
      } finally {
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
    }

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.disabled = true;
        micBtn.title = "Micro non supporté";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "fr-FR";
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        isRecording = true;
        micBtn.textContent = "⏹️";
        setStatus("J'écoute...");
      };

      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        messageInput.value = transcript.trim();
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.textContent = "🎤";
        setStatus("Prête");
      };

      recognition.onerror = () => {
        isRecording = false;
        micBtn.textContent = "🎤";
        setStatus("Micro indisponible");
      };
    }

    function toggleMic() {
      if (!recognition) {
        alert("Micro non supporté sur ce navigateur.");
        return;
      }

      stopSpeaking();

      if (isRecording) {
        recognition.stop();
      } else {
        recognition.start();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    micBtn.addEventListener("click", toggleMic);
    speakBtn.addEventListener("click", stopSpeaking);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    initRecognition();

    addMessage(
      "rose",
      "Bonjour David 🌹 Je suis Rose. Tu peux m'écrire, utiliser le micro, et je peux aussi te répondre à voix haute."
    );
  </script>
</body>
</html>
